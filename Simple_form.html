<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
        <legend>Html simple Form</legend>

        <label for="emai">Enter Email_Id:</label>
        <input type="text" id="emial" placeholder="enter your email"> 
   
       <br>
       <br>
       <label for="pass">Enter Password:</label>
       <input type="text" id="pass" placeholder="enter your pass">
        <br>
        <br>
       <label>Gender:</label>

        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br>
        <br>

        <label for="date">Choose Date:</label>
        <input type="date" id="date">
        <br><br>

        <label for="selector1">Choose your dishes:-</label>
        <select name="Dishes" id="select1" multiple >
            <option value="meggi">Meggi</option>
            <option value="kurkure">Kurkure</option>
            <option value="chips">Chips</option>
        </select>
        <br><br>

        <label for="fileSelect1">Upload:</label>
        <input type="file" name="fileSelect1" id="fileSelect1">
        <br><br>
        

        <textarea name="textArea1" id="textArea1" placeholder="Enter text Here:"></textarea>

        <br>
        <br>
       <button type="submit">Sumbit</button>
        </fieldset>
    </form>
    
</body>
</html>
